<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando imagens</title>
</head>
<body>
    <p><a href="links.html">Voltar para exemplo</a></p>
    <h1>Trabalhando com imagens no HTML</h1>
    <hr>
    <p>Formatos mais comuns:</p>
    <ul>
        <!-- BITMAP (PIXELS) -->
        <li>JPEG/JPG: fotos em geral</li>
        <li>PNG: fotos e ilustrações com transparência.</li>
        <li>GIF: ilustrações básicas e animações</li>

        <!-- VETOR -->
        <li>SVG: <b>desenho/ilustração</b> 
        vetorial</li>
    </ul>

    <h2>Exemplos</h2>

    <!-- 
    Tag/Elemento: img 
    Atributos (obrigatórios):
    src -> indica o caminho e o arquivo de imagem
    alt -> indica um texto descritivo e alternativo
    -->

    <img src="imagens/pink-floyd.jpg" alt="Integrantes da banda acenando para o público">

    <!-- Inserindo imagem dentro de outras
    tags -->
    <p>
        <img src="imagens/logo-html5.png" alt="">
    </p>

    <p>
        <img src="imagens/logo-css3.gif" alt="">
    </p>

    <p>
        <img src="imagens/g1.jpg" alt="">
        <img src="imagens/uol.jpg" alt="">
        <img src="imagens/terra.jpg" alt="">
    </p>

    <!-- Novidades trazida no HTML5 -->
    <figure>
        <img src="imagens/pacoca.jpg" alt="">
        <figcaption>
            O mercado está em falta de opções
            de Paçoquita.
        </figcaption>
    </figure>

    <figure>
        <img src="imagens/logo-html5.png" alt="">
        <img src="imagens/logo-css3.gif" alt="">
        <img src="imagens/logo-javascript.gif" alt="">
        <figcaption>
            Tecnologias do mundo Front-End
        </figcaption>
    </figure>

    <p> <img src="imagens/computer.gif" alt=""> </p>
    
    <p>
        <img src="imagens/black-cat.png" alt="">
    </p>

    <p>
        <img src="imagens/black-cat.svg" alt="">
    </p>

</body>
</html>
